name: Deploy to Another Repository

on:
  push:
    branches:
      - debug  # Замените на нужную ветку исходного репозитория

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1. Проверяем текущий репозиторий
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Validate token
        run: |
            if [ -z "${{ secrets.DEBUG_DEPLOY_TOKEN }}" ]; then
            echo "DEBUG_DEPLOY_TOKEN is missing. Please configure it as a secret."
            exit 1
            fi

      # Шаг 2. Добавляем целевой репозиторий как дополнительный remote и делаем push
      - name: Add destination remote and push
        run: |
          # Добавляем удалённый репозиторий "deploy"
          git remote add deploy https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/ReiDelsAltres/BlHell-per-Debug
          # Пушим ветку main в удалённый репозиторий
          git push deploy main --force

      # Шаг 2. Клонируем целевой (destination) репозиторий в подкаталог "destination"
